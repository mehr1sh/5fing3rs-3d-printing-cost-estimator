services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: printuser
      POSTGRES_PASSWORD: print123
      POSTGRES_DB: printing_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://printuser:print123@postgres:5432/printing_platform
      SECRET_KEY: change_this_in_production_to_a_random_secure_string_123!
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      # CORS origins for API (update with your actual domain when deployed)
      ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://your-server-ip:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./gcode:/app/gcode
    restart: unless-stopped
    # Use gunicorn with uvicorn workers for production (instead of auto-reloading uvicorn)
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
